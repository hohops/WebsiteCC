<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Quiz da Ciência</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container"></div>
  <header>
    <h1>Quiz Diário das Ciências</h1>
    <p>Responde a pergunta do dia, ganha pontos e vê o placar!</p>
  </header>

  <main>
    <section id="auth">
      <div id="login-panel">
        <div class="form-control">
          <input id="username" type="text" required="">
          <label>
            <span style="transition-delay:0ms">U</span><span style="transition-delay:50ms">s</span><span style="transition-delay:100ms">e</span><span style="transition-delay:150ms">r</span><span style="transition-delay:200ms">n</span><span style="transition-delay:250ms">a</span><span style="transition-delay:300ms">m</span><span style="transition-delay:350ms">e</span>
          </label>
        </div>
        <div class="form-control">
          <input id="password" type="password" required="">
          <label>
            <span style="transition-delay:0ms">P</span><span style="transition-delay:50ms">a</span><span style="transition-delay:100ms">s</span><span style="transition-delay:150ms">s</span><span style="transition-delay:200ms">w</span><span style="transition-delay:250ms">o</span><span style="transition-delay:300ms">r</span><span style="transition-delay:350ms">d</span>
          </label>
        </div>
        <button class="btn-53" id="btn-login">
  <div class="original">Entrar</div>
  <div class="letters">
    
    <span>E</span>
    <span>N</span>
    <span>T</span>
    <span>R</span>
    <span>A</span>
    <span>R</span>
  </div>
</button>
<button class="btn-53" id="btn-register">
  <div class="original">Registrar</div>
  <div class="letters">
    
    <span>R</span>
    <span>E</span>
    <span>G</span>
    <span>I</span>
    <span>S</span>
    <span>T</span>
    <span>R</span>
    <span>A</span>
    <span>R</span>
    </div>
</button>
      </div>
      <div id="profile" class="hidden">
        <span id="welcome"></span>
        <button id="btn-logout">Sair</button>
      </div>
    </section>

    <section id="question-area" class="card hidden">
      <h2>Pergunta do Dia</h2>
      <div id="question-card">
        <p id="q-text"></p>
        <div id="q-options"></div>
      </div>
      <div id="q-result" class="hidden"></div>
    </section>

    <section id="leaderboard" class="card">
      <h2>Placar</h2>
      <ol id="leader-list"></ol>
    </section>

    <section id="admin" class="card hidden">
      <h2>Área do Admin</h2>
      <div id="admin-login">
        <input id="admin-token" placeholder="Token de admin" aria-label="token">
        <button id="btn-admin-login">Entrar como admin</button>
      </div>
      <div id="admin-panel" class="hidden">
        <h3>Adicionar Pergunta</h3>
        <input id="new-q-text" placeholder="Texto da pergunta">
        <input id="opt-a" placeholder="Opção A">
        <input id="opt-b" placeholder="Opção B">
        <input id="opt-c" placeholder="Opção C">
        <input id="opt-d" placeholder="Opção D">
        <select id="correct">
          <option value="A">Correta: A</option>
          <option value="B">Correta: B</option>
          <option value="C">Correta: C</option>
          <option value="D">Correta: D</option>
        </select>
        <button id="btn-add-q">Adicionar pergunta</button>
        <p class="muted">Observação: Dados são armazenados no Supabase. Veja <a href="db.sql">db.sql</a> para o esquema do banco.</p>
      </div>
    </section>
  </main>

  <footer>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
